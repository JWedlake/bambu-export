<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exporting to Bambu Studio...</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 32px 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      max-width: 380px;
      width: 100%;
      text-align: center;
    }

    .icon {
      font-size: 40px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .sub {
      font-size: 13px;
      color: #666;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    /* Spinner */
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e5e7eb;
      border-top-color: #1b6cdb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .state { display: none; }
    .state.active { display: block; }

    /* Result banners */
    .banner {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
      text-align: left;
      line-height: 1.5;
    }
    .banner.success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .banner.error   { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

    .part-id {
      font-size: 11px;
      color: #aaa;
      margin-bottom: 20px;
      word-break: break-all;
    }

    button {
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-close {
      background: #f3f4f6;
      color: #374151;
    }
    .btn-retry {
      background: #1b6cdb;
      color: white;
      margin-right: 8px;
    }
    .btn-close:hover { background: #e5e7eb; }
    .btn-retry:hover { background: #1558b8; }
  </style>
</head>
<body>
  <div class="card">

    <!-- Exporting state -->
    <div id="state-loading" class="state active">
      <div class="spinner"></div>
      <h1>Exporting to Bambu Studio</h1>
      <p class="sub">Fetching your part from OnShape and opening Bambu Studio...</p>
    </div>

    <!-- Success state -->
    <div id="state-success" class="state">
      <div class="icon">✓</div>
      <h1>Done!</h1>
      <div class="banner success" id="success-msg"></div>
      <p class="sub">Bambu Studio is opening with your part. You can close this tab.</p>
      <button class="btn-close" onclick="window.close()">Close tab</button>
    </div>

    <!-- Error state -->
    <div id="state-error" class="state">
      <div class="icon">✗</div>
      <h1>Export failed</h1>
      <div class="banner error" id="error-msg"></div>
      <p class="part-id" id="error-ids"></p>
      <button class="btn-retry" onclick="runExport()">Try again</button>
      <button class="btn-close" onclick="window.close()">Close tab</button>
    </div>

  </div>

  <script>
    const SERVER = "http://localhost:5001";

    // OnShape passes these as query params when opening the window
    const params      = new URLSearchParams(window.location.search);
    const documentId  = params.get("documentId");
    const workspaceId = params.get("workspaceId");
    const elementId   = params.get("elementId");
    const partId      = params.get("partId");   // the specific part that was right-clicked

    function show(stateId) {
      ["state-loading", "state-success", "state-error"].forEach(function(id) {
        document.getElementById(id).classList.remove("active");
      });
      document.getElementById(stateId).classList.add("active");
    }

    async function runExport() {
      show("state-loading");

      // Validate we have everything
      if (!documentId || !workspaceId || !elementId) {
        document.getElementById("error-msg").textContent =
          "Missing document context. Try right-clicking the part again.";
        document.getElementById("error-ids").textContent =
          "doc: " + (documentId || "?") + "  ws: " + (workspaceId || "?") + "  el: " + (elementId || "?");
        show("state-error");
        return;
      }

      // Check server is up first
      try {
        var ping = await fetch(SERVER + "/ping", { signal: AbortSignal.timeout(3000) });
        if (!ping.ok) throw new Error("bad ping");
      } catch (_) {
        document.getElementById("error-msg").textContent =
          "Local server is not running.\n\nStart it by double-clicking start_server.bat, then click Try again.";
        document.getElementById("error-ids").textContent = "";
        show("state-error");
        return;
      }

      // Request the export
      try {
        var r = await fetch(SERVER + "/export", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            document_id:  documentId,
            workspace_id: workspaceId,
            element_id:   elementId,
            part_id:      partId || null
          })
        });
        var data = await r.json();

        if (data.success) {
          document.getElementById("success-msg").textContent = data.message;
          show("state-success");
          // Auto-close after 4 seconds
          setTimeout(function() { window.close(); }, 4000);
        } else {
          document.getElementById("error-msg").textContent = data.error;
          document.getElementById("error-ids").textContent =
            "doc: " + documentId.slice(0,8) + "...  part: " + (partId || "all");
          show("state-error");
        }
      } catch (err) {
        document.getElementById("error-msg").textContent =
          "Could not reach the local server. Is start_server.bat running?";
        document.getElementById("error-ids").textContent = "";
        show("state-error");
      }
    }

    // Auto-run on page load
    runExport();
  </script>
</body>
</html>
