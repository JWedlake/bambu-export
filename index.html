<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bambu Studio Export</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 16px;
      min-height: 100vh;
    }

    .card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 12px;
      color: #666;
      margin-bottom: 16px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      margin-bottom: 16px;
      padding: 8px 10px;
      background: #f9f9f9;
      border-radius: 6px;
      border: 1px solid #e8e8e8;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green  { background: #22c55e; }
    .dot.red    { background: #ef4444; }
    .dot.yellow { background: #f59e0b; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    #export-btn {
      width: 100%;
      padding: 11px 16px;
      background: #1b6cdb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    #export-btn:hover:not(:disabled) { background: #1558b8; }
    #export-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .result {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
    }
    .result.success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .result.error   { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

    .doc-info {
      font-size: 11px;
      color: #999;
      margin-top: 14px;
      word-break: break-all;
    }

    .no-context {
      font-size: 12px;
      color: #b91c1c;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }

    .server-hint {
      font-size: 11px;
      color: #888;
      margin-top: 10px;
      line-height: 1.5;
    }
    .server-hint code {
      background: #f0f0f0;
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Bambu Studio Export</h1>
    <p class="subtitle">Export this Part Studio as STL and open in Bambu Studio</p>

    <div class="status-row">
      <div class="dot yellow" id="status-dot"></div>
      <span id="status-text">Checking local server...</span>
    </div>

    <div id="no-context" class="no-context" style="display:none">
      No Part Studio context detected.
      Open this panel from inside a Part Studio document.
    </div>

    <button id="export-btn" disabled>Export to Bambu Studio</button>

    <div id="result" class="result"></div>
    <div id="doc-info" class="doc-info"></div>

    <p class="server-hint" id="server-hint" style="display:none">
      Local server is not running. Start it with:<br>
      <code>python server.py</code> (or double-click <code>start_server.bat</code>)
    </p>
  </div>

  <script>
    const SERVER = "http://localhost:5001";

    // OnShape injects these as query params when loading the extension panel
    const params      = new URLSearchParams(window.location.search);
    const documentId  = params.get("documentId");
    const workspaceId = params.get("workspaceId");
    const elementId   = params.get("elementId");
    const hasContext  = !!(documentId && workspaceId && elementId);

    if (hasContext) {
      document.getElementById("doc-info").textContent =
        "doc: " + documentId.slice(0,8) + "...  " +
        "ws: "  + workspaceId.slice(0,8) + "...  " +
        "el: "  + elementId.slice(0,8) + "...";
    } else {
      document.getElementById("no-context").style.display = "block";
    }

    function setStatus(state, text) {
      document.getElementById("status-dot").className = "dot " + state;
      document.getElementById("status-text").textContent = text;
      document.getElementById("server-hint").style.display = state === "red" ? "block" : "none";
    }

    function showResult(type, msg) {
      var el = document.getElementById("result");
      el.className = "result " + type;
      el.textContent = msg;
      el.style.display = "block";
    }

    async function checkServer() {
      try {
        var r = await fetch(SERVER + "/ping", { signal: AbortSignal.timeout(3000) });
        if (r.ok) {
          setStatus("green", "Local server connected");
          if (hasContext) document.getElementById("export-btn").disabled = false;
          return true;
        }
      } catch (_) {}
      setStatus("red", "Local server not running");
      document.getElementById("export-btn").disabled = true;
      return false;
    }

    document.getElementById("export-btn").addEventListener("click", async function() {
      var btn = document.getElementById("export-btn");
      btn.disabled = true;
      btn.textContent = "Exporting...";
      document.getElementById("result").style.display = "none";

      try {
        var r = await fetch(SERVER + "/export", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            document_id:  documentId,
            workspace_id: workspaceId,
            element_id:   elementId
          })
        });
        var data = await r.json();
        if (data.success) {
          showResult("success", data.message);
        } else {
          showResult("error", data.error);
        }
      } catch (err) {
        showResult("error", "Could not reach local server. Is server.py running?");
        setStatus("red", "Local server not running");
      } finally {
        btn.disabled = false;
        btn.textContent = "Export to Bambu Studio";
      }
    });

    checkServer();
    setInterval(checkServer, 15000);
  </script>
</body>
</html>
